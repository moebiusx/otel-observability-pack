# =============================================================================
# ObservabilityPack: payment-service
# -----------------------------------------------------------------------------
# Reference example for the OTel binding (Prometheus + Elasticsearch + Grafana).
# Covers an HTTP API and a Kafka consumer.
# =============================================================================

apiVersion: observability.platform/v1
kind: ObservabilityPack

metadata:
  name: payment-service
  version: 1.5.0
  binding: otel-elastic-prometheus-grafana    # pins the realisation
  owners:
    - team-payments
    - team-platform-sre
  imports:
    - ref: platform/golden-signals-base@1.4
    - ref: platform/std-alert-routes@3.0
    - ref: platform/std-budget-policy@2.1
  bindings:
    service: payment-service
    environments: [prod, staging]
    criticality: tier-1
  labels:
    business_domain: payments
    pii_class: high
  annotations:
    docs: https://docs.example.internal/services/payment-service
    on_call_handbook: https://runbooks.example.internal/payments

spec:

  # ---------------------------------------------------------------------------
  # OTel instrumentation contract
  # ---------------------------------------------------------------------------
  otel:
    semconv: "1.27.0"
    resource_attributes:
      required:
        - service.name
        - service.namespace
        - service.version
        - service.instance.id
        - deployment.environment
      custom:
        - tenant.id           # multi-tenant payment processing
        - business.domain     # "payments"
    sdk:
      languages: [java, node]
      sampling:
        policy: parentbased_traceidratio
        ratio: 0.1            # head-based; tail sampling done in the Collector
      propagators: [tracecontext, baggage]
      log_correlation: true   # inject trace_id / span_id into structured logs

  # ---------------------------------------------------------------------------
  # Telemetry backend catalog — named, versioned, multi-product instances.
  # Each backend declares a product, a signal class, endpoints (failover
  # order), an auth secret reference (never inlined), and a version-gating
  # policy mirroring the MCP server's capability/version model.
  # ---------------------------------------------------------------------------
  telemetry:
    backends:
      - id: metrics-prom
        signal: metrics
        product: prometheus
        version: { declared: "2.55", min: "2.53", gating: warn }
        endpoints: [https://prom-a.internal:9090, https://prom-b.internal:9090]
        auth: { kind: bearer, secretRef: prometheus-token }
        tenant: payments
        default: true
      - id: logs-es
        signal: logs
        product: elasticsearch
        version: { declared: "8.15", min: "8.13", gating: warn }
        endpoints: [https://es.internal:9200]
        auth: { kind: basic, secretRef: es-credentials }
      - id: traces-es
        signal: traces
        product: elasticsearch
        version: { declared: "8.15", min: "8.13", gating: warn }
        endpoints: [https://es.internal:9200]
        auth: { kind: basic, secretRef: es-credentials }
      - id: profiles-pyroscope
        signal: profiles
        product: pyroscope
        version: { declared: "1.7", gating: "off" }
        endpoints: [https://pyroscope.internal:4040]
      - id: mesh-envoy
        signal: mesh
        product: envoy
        endpoints: [http://localhost:9901]
      - id: net-cilium
        signal: network
        product: cilium
        endpoints: [http://cilium-agent.kube-system:9879]
        auth: { kind: serviceaccount }
      - id: policy-opa
        signal: policy
        product: opa
        endpoints: [http://opa.payments:8181]
      - id: gw-kong
        signal: gateway
        product: kong
        endpoints: [http://kong-admin.payments:8001]
      - id: collect-vector
        signal: collection
        product: vector
        endpoints: [http://vector.payments:8686]

  # ---------------------------------------------------------------------------
  # Environments — base criticality is tier-1; per-environment overlays adjust
  # the execution target, criticality, backend wiring, and sampling.
  # ---------------------------------------------------------------------------
  environments:
    prod:
      target: ske
      criticality: tier-1
      backends: { metrics: metrics-prom, logs: logs-es, traces: traces-es }
      overrides:
        storage.metrics.retention: 13mo
        otel.sdk.sampling.ratio: 0.1
      promote_after: 30d
    staging:
      target: bare-k8s
      criticality: tier-2
      backends: { metrics: metrics-prom, logs: logs-es, traces: traces-es }
      overrides:
        otel.sdk.sampling.ratio: 1.0
      suppress: [deploy_freezes]

  # ---------------------------------------------------------------------------
  # 1. SLIs — referenced by OTel SemConv name; query is the materialised PromQL
  # ---------------------------------------------------------------------------
  slis:

    # --- HTTP API surface ---
    - id: api_availability
      type: ratio
      description: HTTP responses that are not 5xx, over total responses.
      semconv_metric: http.server.request.duration
      good:  |
        sum(rate(http_server_request_duration_seconds_count{
          service_name="payment-service",
          http_response_status_code!~"5.."
        }[5m]))
      total: |
        sum(rate(http_server_request_duration_seconds_count{
          service_name="payment-service"
        }[5m]))
      owner: team-payments

    - id: api_latency_p99
      type: threshold
      description: 99th-percentile API latency, server-side.
      semconv_metric: http.server.request.duration
      query: |
        histogram_quantile(0.99,
          sum by (le)(rate(http_server_request_duration_seconds_bucket{
            service_name="payment-service"
          }[5m])))
      threshold: 0.5
      unit: seconds

    - id: api_latency_p99_checkout
      type: threshold
      description: 99th-percentile latency for the /checkout endpoint.
      semconv_metric: http.server.request.duration
      query: |
        histogram_quantile(0.99,
          sum by (le)(rate(http_server_request_duration_seconds_bucket{
            service_name="payment-service",
            http_route="/checkout"
          }[5m])))
      threshold: 0.3
      unit: seconds

    # --- Kafka consumer surface ---
    - id: consumer_freshness
      type: threshold
      description: Consumer lag for the settlement topic.
      semconv_metric: messaging.kafka.consumer.lag
      query: |
        max(messaging_kafka_consumer_lag_seconds{
          service_name="payment-service",
          messaging_consumer_group="payment-settler"
        })
      threshold: 60
      unit: seconds

    - id: consumer_processing_success
      type: ratio
      description: Settlement events processed successfully vs. total.
      semconv_metric: messaging.process.duration
      good:  |
        sum(rate(messaging_process_duration_seconds_count{
          service_name="payment-service",
          messaging_operation="process",
          messaging_outcome="ok"
        }[5m]))
      total: |
        sum(rate(messaging_process_duration_seconds_count{
          service_name="payment-service",
          messaging_operation="process"
        }[5m]))

  # ---------------------------------------------------------------------------
  # 2. SLOs
  # ---------------------------------------------------------------------------
  slos:
    - { id: api_availability_99_9,           sli: api_availability,           objective: 0.999,  window: 30d, error_budget_policy: ref:platform/std-budget-policy }
    - { id: api_latency_99_p99_500ms,        sli: api_latency_p99,            objective: 0.99,   window: 30d, error_budget_policy: ref:platform/std-budget-policy }
    - { id: checkout_latency_99_5_p99_300ms, sli: api_latency_p99_checkout,   objective: 0.995,  window: 30d, error_budget_policy: ref:platform/std-budget-policy }
    - { id: consumer_freshness_99_under_60s, sli: consumer_freshness,         objective: 0.99,   window: 30d, error_budget_policy: ref:platform/std-budget-policy }
    - { id: consumer_success_99_95,          sli: consumer_processing_success, objective: 0.9995, window: 30d, error_budget_policy: ref:platform/std-budget-policy }

  # ---------------------------------------------------------------------------
  # 3. Pipelines — mirrors OTel Collector config
  # ---------------------------------------------------------------------------
  pipelines:

    receivers:
      - name: otlp
        protocols: [grpc, http]
        endpoint: 0.0.0.0:4317
      - name: prometheus
        scrape_configs:
          - job_name: payment-api
            scrape_interval: 15s
            kubernetes_sd_configs:
              - { role: pod, namespaces: { names: [payments] } }
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app]
                regex: payment-service
                action: keep

    processors:
      - name: memory_limiter
        limit_percentage: 80
      - name: batch
        timeout: 10s
      - name: resource
        attributes:
          - { key: deployment.environment, value: "${ENV}",  action: upsert }
          - { key: business.domain,        value: "payments", action: insert }
      - name: transform
        log_statements:
          - context: log
            statements:
              - set(attributes["service.namespace"], "payments") where attributes["service.namespace"] == nil
      - name: tail_sampling
        decision_wait: 10s
        policies:
          - { name: errors,        type: status_code,   status_code: { status_codes: [ERROR] } }
          - { name: slow,          type: latency,       latency: { threshold_ms: 500 } }
          - { name: probabilistic, type: probabilistic, probabilistic: { sampling_percentage: 5 } }
      - name: attributes/redact
        actions:
          - { key: pan,             action: delete }
          - { key: cvv,             action: delete }
          - { key: customer.email,  action: hash }

    exporters:
      metrics:
        kind: prometheusremotewrite
        endpoint: https://prometheus.internal/api/v1/write
        external_labels: { service: payment-service }
      logs:
        kind: elasticsearch
        endpoints: [https://es.internal:9200]
        logs_index: logs-payments-default
      traces:
        kind: elasticsearch
        endpoints: [https://es.internal:9200]
        traces_index: traces-apm-default

  # ---------------------------------------------------------------------------
  # 4. Storage — backends pinned per binding
  # ---------------------------------------------------------------------------
  storage:
    metrics:
      backend: prometheus
      version: "2.55"
      retention: 30d
      remote_write:
        - url: https://mimir.internal/api/v1/push
          tenant: payments
    logs:
      backend: elasticsearch
      version: "8.15"
      data_stream: logs-payments-default
      ilm_policy: ref:platform/std-logs-ilm-90d
    traces:
      backend: elasticsearch
      version: "8.15"
      data_stream: traces-apm-default
      ilm_policy: ref:platform/std-traces-ilm-14d
      sampling: tail-based

  # ---------------------------------------------------------------------------
  # Additional observable surfaces — each references a telemetry backend by id.
  # These are optional, binding-gated dimensions surfaced by the MCP server.
  # ---------------------------------------------------------------------------
  profiling:
    backend: profiles-pyroscope
    product: pyroscope
    profile_types: [cpu, alloc_space, inuse_space]

  network:
    backend: net-cilium
    product: cilium
    observe: [endpoints, policy, services, flows]

  policy_engine:
    backend: policy-opa
    product: opa
    bundles: [payments/authz, payments/pci]

  mesh:
    - product: envoy
      role: proxy
      backend: mesh-envoy
      version: { declared: "1.31", min: "1.28", gating: warn }
    - product: kong
      role: gateway
      backend: gw-kong

  collection:
    - product: vector
      role: aggregator
      backend: collect-vector
    - product: fluentbit
      role: agent

  # ---------------------------------------------------------------------------
  # 5. Queries — recording rules in Prom rule-group form
  # ---------------------------------------------------------------------------
  queries:
    recording_rules:
      - name: payment:api_availability:ratio_5m
        expr: ref:slis.api_availability
        interval: 30s
      - name: payment:api_errorbudget:burn_1h
        expr: (1 - payment:api_availability:ratio_5m) / (1 - 0.999)
        interval: 1m
      - name: payment:checkout_latency:p99_5m
        expr: ref:slis.api_latency_p99_checkout
        interval: 30s
      - name: payment:consumer_lag:seconds_max_5m
        expr: ref:slis.consumer_freshness
        interval: 30s

    derived_views:
      - id: golden_signals
        bind: ref:platform/golden-signals-view
        params: { service: payment-service }
      - id: per_tenant_availability
        bind: ref:platform/per-tenant-rollup
        params: { sli: api_availability, by: [tenant_id] }

  # ---------------------------------------------------------------------------
  # 6. Dashboards — Grafana 11+ schemaVersion 39+, datasource refs
  # ---------------------------------------------------------------------------
  dashboards:
    - id: payment-overview
      provider: { kind: grafana, version: "11.3", schemaVersion: 39 }
      folder: payment-service
      source: file://dashboards/payment-overview.json
      datasources:
        metrics: ref:platform/ds-prometheus
        logs:    ref:platform/ds-elasticsearch-logs
        traces:  ref:platform/ds-elasticsearch-apm
      panel_bindings:
        - { panel: sli-api-availability,    binds_to: slis.api_availability }
        - { panel: sli-api-latency-p99,     binds_to: slis.api_latency_p99 }
        - { panel: sli-consumer-freshness,  binds_to: slis.consumer_freshness }
        - { panel: slo-api-availability,    binds_to: slos.api_availability_99_9 }

    - id: payment-slo-burn
      provider: { kind: grafana, version: "11.3", schemaVersion: 39 }
      folder: payment-service
      template: ref:platform/slo-burn-template
      params: { slos: [ api_availability_99_9, checkout_latency_99_5_p99_300ms, consumer_freshness_99_under_60s ] }

    - id: payment-deployment
      provider: { kind: grafana, version: "11.3", schemaVersion: 39 }
      folder: payment-service
      template: ref:platform/deployment-overlay-template
      params: { service: payment-service }

    - id: payment-customer-impact
      provider: { kind: grafana, version: "11.3", schemaVersion: 39 }
      folder: payment-service
      template: ref:platform/per-tenant-template
      params: { view: per_tenant_availability }

  # ---------------------------------------------------------------------------
  # 7. Policy — burn-rate alerts (rendered as Prometheus alerting rules)
  # ---------------------------------------------------------------------------
  policy:
    burn_rate_alerts:
      - slo: api_availability_99_9
        windows:
          - { short: 5m,  long: 1h, factor: 14, severity: SEV1 }
          - { short: 30m, long: 6h, factor: 6,  severity: SEV2 }

      - slo: checkout_latency_99_5_p99_300ms
        windows:
          - { short: 5m,  long: 1h, factor: 14, severity: SEV1 }
          - { short: 30m, long: 6h, factor: 6,  severity: SEV2 }

      - slo: consumer_freshness_99_under_60s
        windows:
          - { short: 10m, long: 1h, factor: 10, severity: SEV2 }
          - { short: 1h,  long: 6h, factor: 4,  severity: SEV3 }

      - slo: consumer_success_99_95
        windows:
          - { short: 5m,  long: 1h, factor: 14, severity: SEV1 }
          - { short: 30m, long: 6h, factor: 6,  severity: SEV2 }

    forecasts:
      - { slo: api_availability_99_9,            method: holt-winters,           horizon: 7d, on_projected_breach: open_ticket }
      - { slo: checkout_latency_99_5_p99_300ms,  method: percentile-of-history,  horizon: 3d, on_projected_breach: post_warning }

  # ---------------------------------------------------------------------------
  # 8. Alerting — rendered to Alertmanager routes + receivers
  # ---------------------------------------------------------------------------
  alerting:
    routes:
      - severity: SEV1
        channels:
          - { msteams:  "#payments-oncall" }
          - { voice:    "pagerduty://payments" }
          - { whatsapp: "group://payments-oncall" }
      - severity: SEV2
        channels:
          - { msteams:  "#payments-oncall" }
          - { voice:    "pagerduty://payments-low" }
      - severity: SEV3
        channels:
          - { msteams: "#payments-team" }

    dedup: ref:platform/std-dedup
    suppress: [ maintenance_windows, deploy_freezes, dependency_outage ]

  # ---------------------------------------------------------------------------
  # 9. Self-healing — Argo Workflow templates with guardrails
  # ---------------------------------------------------------------------------
  remediation:
    - trigger: alert:payment-api-pod-oom
      runbook: file://runbooks/api-oom.md
      automation: argo-workflow://restart-with-bumped-limits
      guardrails:
        max_invocations_per_hour: 3
        requires_human_above: SEV1
        rollback_on_failure: true
        cooldown_after_success: 15m
        circuit_breaker: { failures: 2, window: 1h }

    - trigger: alert:payment-settler-stuck
      runbook: file://runbooks/settler-stuck.md
      automation: argo-workflow://settler-rebalance
      guardrails:
        max_invocations_per_hour: 2
        requires_human_above: SEV2
        rollback_on_failure: false
        cooldown_after_success: 30m

    - trigger: alert:payment-api-cert-expiring
      runbook: file://runbooks/cert-rotation.md
      automation: argo-workflow://rotate-tls-cert
      guardrails:
        max_invocations_per_hour: 1
        requires_human_above: SEV3
        rollback_on_failure: true

  # ---------------------------------------------------------------------------
  # 10a. Baselines
  # ---------------------------------------------------------------------------
  baselines:
    mttd_target_p50: 2m
    mttd_target_p95: 5m
    mttr_target_p50: 30m
    mttr_target_p95: 1h
    measurement_source: incident-mgmt + alertmanager firing timestamps
    review_cadence: monthly
    regression_gate: block_release_if_either_breaches_target

  # ---------------------------------------------------------------------------
  # 10b. Validation — chaos + Elastic Synthetics with OTel propagation
  # ---------------------------------------------------------------------------
  validation:

    chaos_experiments:

      - id: api-pod-kill
        engine: chaos-mesh
        target: payment-api
        steady_state_hypothesis: ref:slos.api_availability_99_9
        fault: { kind: pod-failure,           fraction: 0.5,  duration: 60s }
        expected_alerts: [ payment-api-pod-down ]
        expected_mttd: 2m
        schedule: weekly
        environment: staging

      - id: api-network-latency
        engine: chaos-mesh
        target: payment-api
        steady_state_hypothesis: ref:slos.checkout_latency_99_5_p99_300ms
        fault: { kind: network-delay,         fraction: 0.25, duration: 5m }
        expected_alerts: [ checkout-latency-burn-fast ]
        expected_mttd: 5m
        schedule: monthly
        environment: prod

      - id: kafka-partition-failure
        engine: chaos-mesh
        target: payment-settler
        steady_state_hypothesis: ref:slos.consumer_freshness_99_under_60s
        fault: { kind: kafka-partition-isolate, duration: 3m }
        expected_alerts: [ settler-lag-burn-fast ]
        expected_mttd: 5m
        schedule: monthly
        environment: staging

    synthetic_checks:

      - id: api-checkout-canary
        kind: elastic-synthetics
        target: https://api.example.com/payments/checkout/canary
        interval: 1m
        otel_instrumentation: true             # probe propagates traceparent; trace lands in APM
        assertions:
          - { status_code: 200 }
          - { latency_lt: 500ms }
          - { body_contains: "ok" }
        on_fail_severity: SEV2

      - id: api-tls-validity
        kind: elastic-synthetics
        target: https://api.example.com/payments/health
        interval: 10m
        assertions:
          - { tls_expiry_gt: 14d }
        on_fail_severity: SEV3
