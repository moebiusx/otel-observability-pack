apiVersion: v1
kind: Namespace
metadata:
  name: observability-pack-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: observability-pack-operator
  namespace: observability-pack-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: observability-pack-operator
rules:
  # Own resource
  - apiGroups: [observability.platform]
    resources: [packs]
    verbs: [get, list, watch, update, patch]
  - apiGroups: [observability.platform]
    resources: [packs/status]
    verbs: [get, update, patch]
  # Tool CRDs we drive
  - apiGroups: [monitoring.coreos.com]
    resources: [prometheusrules]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [grafana.integreatly.org]
    resources: [grafanadashboards]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [opentelemetry.io]
    resources: [opentelemetrycollectors, instrumentations]
    verbs: [get, list, watch, create, update, patch, delete]
  # Secrets for Azure pipeline credentials
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # Events for status surfacing
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-pack-operator
subjects:
  - kind: ServiceAccount
    name: observability-pack-operator
    namespace: observability-pack-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: observability-pack-operator
---
# Leader-election lease in the operator's own namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: observability-pack-leader-election
  namespace: observability-pack-system
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: observability-pack-leader-election
  namespace: observability-pack-system
subjects:
  - kind: ServiceAccount
    name: observability-pack-operator
    namespace: observability-pack-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: observability-pack-leader-election
