<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 940 940" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <title>ObservabilityPack — Layered Implementation</title>
  <desc>A five-layer model: Contract, Telemetry, Insight, Action, with Validation wrapping the loop and Governance at the bottom.</desc>
  <defs>
